server {
    listen 1021;
    server_name _;
    root /Sites/byabsayee/public;
    index index.php;

    # Limit upload size to 10 MB (attachment uploads go up to 10 MB in the app)
    client_max_body_size 10M;

    # Custom error pages — route through PHP so the app layout is used
    error_page 403 /index.php?_error=403;
    error_page 413 /index.php?_error=413;
    error_page 404 /index.php?_error=404;

    # Serve uploaded files directly (images, PDFs, etc.)
    # autoindex is off — directory listing is forbidden with a custom 403
    location /uploads/ {
        alias /Sites/byabsayee/uploads/;
        autoindex off;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets (CSS, JS, fonts, favicons) from /public
    location ~* ^(?!/uploads/).*\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|pdf)$ {
        expires 7d;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\. { deny all; }
    location ~* /(docker-compose|Dockerfile|\.env|composer\.json|composer\.lock) {
        deny all;
    }
}
