server {
    listen 1021;
    server_name _;
    root /Sites/byabsayee/public;
    index index.php;

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        access_log off;
    }

    location /uploads/ {
        alias /Sites/byabsayee/uploads/;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\. { deny all; }
    location ~* /(docker-compose|Dockerfile|\.env|composer\.json|composer\.lock) {
        deny all;
    }
}