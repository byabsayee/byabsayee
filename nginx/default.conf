server {
    listen 1021;
    server_name _;
    root /Sites/byabsayee/public;
    index index.php;

    # Serve uploaded files directly (images, PDFs, etc.)
    location /uploads/ {
        alias /Sites/byabsayee/uploads/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets (CSS, JS, fonts, favicons) from /public
    location ~* ^(?!/uploads/).*\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|pdf)$ {
        expires 7d;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\. { deny all; }
    location ~* /(docker-compose|Dockerfile|\.env|composer\.json|composer\.lock) {
        deny all;
    }
}
